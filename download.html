<style>
    /* Fade-in animation for page content */
.fade-in {
    opacity: 0;
    transform: translateY(30px); /* content starts slightly lower */
    animation: fadeInUp 0.8s forwards;
    animation-delay: 0.3s;
}

/* Staggered child animations (optional) */
.fade-in > * {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.8s forwards;
}

/* Keyframes for fade + slide up */
@keyframes fadeInUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

:root{
    --light: rgb(157,235,192);
    --mid: rgb(81,138,105);
    --dark: rgb(49,79,62);
}

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, rgb(60,110,85), var(--dark));
    color:white;
    text-align:center;
}

.container{
    padding-top:180px;
}

h1{
    font-size:3rem;
    color:var(--light);
    text-shadow:0 0 25px var(--light), 0 0 50px var(--mid);
    margin-bottom:20px;
}

p{
    font-size:1.2rem;
    margin-bottom:40px;
    opacity:0.9;
}

/* BUTTON STYLES */
.download-btn, .readme-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin:20px 10px;
    padding:18px 60px;
    border-radius:60px;
    background:transparent;
    color:var(--light);
    text-decoration:none;
    font-weight:bold;
    font-size:1.2rem;
    border:2px solid var(--light);
    box-shadow:0 0 20px var(--mid);
    transition: all 0.3s ease;
}

.download-btn:hover, .readme-btn:hover{
    transform:scale(1.15);
    background:rgba(157,235,192,0.1);
    box-shadow:0 0 30px var(--light),
               0 0 60px var(--mid),
               0 0 90px var(--mid);
}

.back{
    display:inline-block;
    margin-top:40px;
    color:var(--light);
    text-decoration:none;
}
</style>
</head>
