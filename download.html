<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download Øxide</title>

<style>
:root{
    --light: rgb(157,235,192);
    --mid: rgb(81,138,105);
    --dark: rgb(49,79,62);
}

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, rgb(60,110,85), var(--dark));
    color:white;
    text-align:center;
}

.container{
    padding-top:180px;
}

h1{
    font-size:3rem;
    color:var(--light);
    text-shadow:0 0 25px var(--light),
                0 0 50px var(--mid);
}

/* DOWNLOAD BUTTON */
.download-btn{
    margin-top:60px;
    display:inline-flex;
    align-items:center;
    gap:15px;
    padding:20px 60px;
    border-radius:60px;
    background:transparent;
    color:var(--light);
    text-decoration:none;
    font-weight:bold;
    font-size:1.3rem;
    border:2px solid var(--light);
    box-shadow:0 0 20px var(--mid);
    transition:0.3s ease;
}

.download-btn img{
    width:28px;
}

.download-btn:hover{
    transform:scale(1.18);
    background:rgba(157,235,192,0.1);
    box-shadow:0 0 30px var(--light),
               0 0 60px var(--mid),
               0 0 90px var(--mid);
}

.back{
    display:inline-block;
    margin-top:40px;
    color:var(--light);
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
    <h1>Download Øxide Panel</h1>
    <p>Click below to download Øxide panel.dll</p>

    <a class="download-btn" href="Øxide panel.dll" download>
        ⬇ Download Øxide Panel.dll
    </a>

    <br>
    <a href="index.html" class="back">← Back to Home</a>
</div>

</body>
</html>
